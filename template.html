<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Partner Call Dashboard — Wiom | April 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2f5;--surface:#fff;--surface2:#f7f8fa;--border:#e4e7ec;--border2:#d0d5dd;
  --text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --accent:#2563eb;--accent-light:#eff6ff;
  --HH:#dc2626;--HH-bg:#fef2f2;--HH-border:#fecaca;
  --HL:#d97706;--HL-bg:#fffbeb;--HL-border:#fde68a;
  --LH:#2563eb;--LH-bg:#eff6ff;--LH-border:#bfdbfe;
  --LL:#059669;--LL-bg:#ecfdf5;--LL-border:#a7f3d0;
  --NA:#6b7280;--NA-bg:#f9fafb;--NA-border:#e5e7eb;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -1px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:200;box-shadow:var(--shadow)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:16px;height:16px;fill:white}
.logo-name{font-size:15px;font-weight:600;color:var(--text)}
.logo-sub{font-size:12px;color:var(--text2);margin-left:2px}
.topbar-right{display:flex;align-items:center;gap:16px}
.data-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:#ecfdf5;color:#059669;border:1px solid #a7f3d0;font-weight:500}
.topbar-meta{display:flex;align-items:center;gap:16px}
.meta-item{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px}
.meta-item strong{color:var(--text);font-weight:600}
.meta-dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.layout{display:flex;height:calc(100vh - 52px)}
.sidebar{width:210px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.sidebar-section{padding:12px 0 4px}
.sidebar-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:0 14px 6px}
.nav-btn{display:flex;align-items:center;width:100%;padding:9px 14px;border:none;background:transparent;cursor:pointer;text-align:left;transition:background .12s;gap:10px;border-left:3px solid transparent;font-family:'Inter',sans-serif}
.nav-btn:hover{background:var(--surface2)}
.nav-btn.active{background:var(--accent-light);border-left-color:var(--accent)}
.nav-btn .nb-icon{font-size:14px;flex-shrink:0}
.nav-btn .nb-label{font-size:13px;color:var(--text);font-weight:400;flex:1}
.nav-btn.active .nb-label{color:var(--accent);font-weight:500}
.date-btn{display:flex;align-items:center;width:100%;padding:8px 14px;border:none;background:transparent;cursor:pointer;text-align:left;transition:background .12s;gap:8px;border-left:3px solid transparent;font-family:'Inter',sans-serif}
.date-btn:hover{background:var(--surface2)}
.date-btn.active{background:var(--accent-light);border-left-color:var(--accent)}
.date-btn .d-day{font-size:10px;color:var(--text3);font-weight:500;min-width:26px}
.date-btn .d-label{font-size:13px;color:var(--text);font-weight:400;flex:1}
.date-btn.active .d-label{color:var(--accent);font-weight:500}
.date-btn .d-count{font-size:11px;color:var(--text3);background:var(--surface2);padding:1px 7px;border-radius:10px;font-family:'JetBrains Mono',monospace}
.date-btn.active .d-count{background:rgba(37,99,235,.1);color:var(--accent)}
.main{flex:1;overflow-y:auto;padding:20px 24px}
.page-header{margin-bottom:20px}
.page-title{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.page-subtitle{font-size:13px;color:var(--text2);margin-top:3px}
.page-badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 10px;border-radius:20px;background:var(--accent-light);color:var(--accent);margin-top:6px}
.stats-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;flex:1;min-width:100px;box-shadow:var(--shadow)}
.stat-card .sv{font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}
.stat-card .sl{font-size:11px;color:var(--text2);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.sc-total .sv{color:var(--text)}.sc-cats .sv{color:#7c3aed}
.sc-HH .sv{color:var(--HH)}.sc-HH{border-top:3px solid var(--HH)}
.sc-HL .sv{color:var(--HL)}.sc-HL{border-top:3px solid var(--HL)}
.sc-LH .sv{color:var(--LH)}.sc-LH{border-top:3px solid var(--LH)}
.sc-LL .sv{color:var(--LL)}.sc-LL{border-top:3px solid var(--LL)}
.cats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .15s}
.cat-card:hover{box-shadow:var(--shadow-md)}
.cat-card-head{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.cat-name-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.cat-rank{font-size:11px;font-weight:700;color:var(--text3);min-width:18px;margin-top:1px}
.cat-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3}
.cat-stats{display:flex;align-items:center;gap:10px}
.cat-count-label{font-size:12px;color:var(--text2)}.cat-count-label b{color:var(--text);font-weight:600}
.cat-pct-pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--accent-light);color:var(--accent)}
.cat-bar-wrap{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.cat-bar{height:100%;border-radius:3px}
.vlist{padding:6px 0}
.vitem{display:flex;align-items:flex-start;gap:10px;padding:9px 16px;border-bottom:1px solid #f3f4f6}
.vitem:last-child{border-bottom:none}
.vbullet{width:5px;height:5px;border-radius:50%;background:#d1d5db;margin-top:7px;flex-shrink:0}
.vcontent{flex:1;min-width:0}
.vtext{font-size:13px;color:var(--text);line-height:1.55}
.vmeta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px;font-family:'JetBrains Mono',monospace}
.b-HH{background:var(--HH-bg);color:var(--HH);border:1px solid var(--HH-border)}
.b-HL{background:var(--HL-bg);color:var(--HL);border:1px solid var(--HL-border)}
.b-LH{background:var(--LH-bg);color:var(--LH);border:1px solid var(--LH-border)}
.b-LL{background:var(--LL-bg);color:var(--LL);border:1px solid var(--LL-border)}
.b-NA{background:var(--NA-bg);color:var(--NA);border:1px solid var(--NA-border)}
.partner-chip{font-size:11px;color:var(--text3);background:var(--surface2);padding:1px 7px;border-radius:4px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.show-more-btn{width:100%;padding:9px 16px;border:none;background:transparent;color:var(--accent);font-size:12px;font-weight:500;cursor:pointer;text-align:left;border-top:1px solid var(--border);font-family:'Inter',sans-serif}
.show-more-btn:hover{background:var(--accent-light)}
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.ov-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:box-shadow .15s}
.ov-card:hover{box-shadow:var(--shadow-md)}
.ov-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.ov-date-label{font-size:14px;font-weight:600;color:var(--text)}
.ov-total-pill{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--accent);background:var(--accent-light);padding:2px 10px;border-radius:20px}
.ov-prio-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.ov-prio-chip{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;font-family:'JetBrains Mono',monospace}
.ov-cats-list{display:flex;flex-direction:column;gap:5px}
.ov-cat-row{display:flex;align-items:center;gap:8px}
.ov-cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ov-cat-name{font-size:12px;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ov-cat-bar-wrap{width:50px;height:3px;background:var(--surface2);border-radius:2px;flex-shrink:0}
.ov-cat-bar{height:100%;border-radius:2px}
.ov-cat-cnt{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;min-width:18px;text-align:right}
.ov-more{font-size:11px;color:var(--text3);margin-top:5px}
.prio-legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:18px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px}
.pl-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2)}
.pl-dot{width:8px;height:8px;border-radius:2px}
.heatmap-wrap{border-radius:12px;box-shadow:var(--shadow);background:var(--surface);border:1px solid var(--border)}
.heatmap-controls{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.heatmap-controls h3{font-size:15px;font-weight:600;color:var(--text);flex:1}
.sort-btn{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.sort-btn:hover,.sort-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.heatmap-legend{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3)}
.hl-box{width:14px;height:14px;border-radius:3px}
table.heatmap{width:100%;border-collapse:collapse;font-size:12px}
table.heatmap th{padding:8px 10px;text-align:center;font-weight:600;color:var(--text2);white-space:nowrap;border-bottom:2px solid var(--border);font-size:11px;position:sticky;top:0;background:var(--surface);z-index:10}
table.heatmap th.cat-col{text-align:left;min-width:200px;max-width:220px;position:sticky;left:0;background:var(--surface);z-index:20;border-right:1px solid var(--border)}
table.heatmap td{padding:7px 8px;text-align:center;border-bottom:1px solid #f3f4f6;vertical-align:middle}
table.heatmap td.cat-name-cell{text-align:left;padding:8px 10px;font-size:12px;color:var(--text);font-weight:500;position:sticky;left:0;background:var(--surface);z-index:5;border-right:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
table.heatmap tr:hover td{background:rgba(37,99,235,.03)}
table.heatmap tr:hover td.cat-name-cell{background:#f0f4ff}
.hm-cell{display:inline-flex;align-items:center;justify-content:center;width:32px;height:28px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;cursor:default}
.hm-0{background:transparent;color:var(--text3)}
.hm-1{background:#dbeafe;color:#1e40af}.hm-2{background:#bfdbfe;color:#1e40af}
.hm-3{background:#93c5fd;color:#1e3a8a}.hm-4{background:#60a5fa;color:#1e3a8a}
.hm-5{background:#3b82f6;color:#fff}.hm-6{background:#2563eb;color:#fff}
.hm-7{background:#1d4ed8;color:#fff}.hm-high{background:#1e40af;color:#fff}
.total-row td{font-weight:600;background:var(--surface2);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);border-top:2px solid var(--border)}
.total-row td.cat-name-cell{color:var(--text);font-size:12px}
.cat-total-cell{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:12px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
@media(max-width:640px){.sidebar{width:155px}.cats-grid{grid-template-columns:1fr}.stats-row{gap:8px}.stat-card .sv{font-size:20px}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 16 16"><path d="M8 1L1 5v6l7 4 7-4V5L8 1zm0 1.8l5 2.87v4.67L8 13.2l-5-2.87V5.67L8 2.8z"/></svg></div>
    <div><span class="logo-name">Partner Call Dashboard</span><span class="logo-sub"> — Wiom</span></div>
  </div>
  <div class="topbar-right">
    <span class="data-badge">✓ April 2026 · 346 Calls</span>
    <div class="topbar-meta">
      <div class="meta-item"><div class="meta-dot"></div><strong>17</strong>&nbsp;Days</div>
      <div class="meta-item"><div class="meta-dot" style="background:#059669"></div>26 Categories</div>
    </div>
  </div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-section">
      <button class="nav-btn" id="btn-ov" onclick="showOverview(this)"><span class="nb-icon">📊</span><span class="nb-label">Overview</span></button>
      <button class="nav-btn" id="btn-matrix" onclick="showMatrix(this)"><span class="nb-icon">📋</span><span class="nb-label">Category × Daily</span></button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Daily Reports</div>
      <div id="date-nav"></div>
    </div>
  </div>
  <div class="main" id="main"></div>
</div>
<script>
const DATA=__DATA__;
const MATRIX=__MATRIX__;
const CAT_COLORS=['#2563eb','#7c3aed','#db2777','#ea580c','#16a34a','#0891b2','#ca8a04','#dc2626','#65a30d','#0284c7','#9333ea','#059669','#d97706','#c026d3','#0369a1','#15803d','#b45309','#0f766e','#6d28d9','#be185d','#047857','#b91c1c','#1d4ed8','#7e22ce','#0e7490','#166534'];
const colorMap={};let colorIdx=0;
function catColor(n){if(!colorMap[n])colorMap[n]=CAT_COLORS[colorIdx++%CAT_COLORS.length];return colorMap[n];}
function prioBadge(p){const v=(p||'NA').replace('#N/A','NA').trim()||'NA';return `<span class="badge b-${v}">${v}</span>`;}
function setActive(btn){document.querySelectorAll('.nav-btn,.date-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');}
function buildNav(){
  const nav=document.getElementById('date-nav');
  Object.entries(DATA).forEach(([date,d])=>{
    const btn=document.createElement('button');btn.className='date-btn';btn.dataset.date=date;
    btn.innerHTML=`<span class="d-day">${d.day}</span><span class="d-label">${d.dd} ${d.mm||'Apr'}</span><span class="d-count">${d.total}</span>`;
    btn.onclick=()=>showDate(date,btn);nav.appendChild(btn);
  });
}
function showOverview(btn){
  setActive(btn);
  let html=`<div class="page-header"><div class="page-title">Partner Call Overview</div><div class="page-subtitle">17 days · 346 total calls · April 2026</div></div>
  <div class="prio-legend">
    <div class="pl-item"><div class="pl-dot" style="background:var(--HH)"></div><b>HH</b> High Priority, High Impact</div>
    <div class="pl-item"><div class="pl-dot" style="background:var(--HL)"></div><b>HL</b> High Priority, Low Impact</div>
    <div class="pl-item"><div class="pl-dot" style="background:var(--LH)"></div><b>LH</b> Low Priority, High Impact</div>
    <div class="pl-item"><div class="pl-dot" style="background:var(--LL)"></div><b>LL</b> Low Priority, Low Impact</div>
  </div><div class="ov-grid">`;
  Object.entries(DATA).forEach(([date,d],idx)=>{
    const ph={HH:0,HL:0,LH:0,LL:0};
    d.categories.forEach(c=>c.records.forEach(r=>{const p=(r.p||'NA').replace('#N/A','NA').trim();if(ph[p]!==undefined)ph[p]++;}));
    const topCats=d.categories.slice(0,4);const maxCnt=d.categories[0]?.count||1;
    const prioHtml=Object.entries(ph).filter(([,v])=>v>0).map(([k,v])=>`<span class="ov-prio-chip b-${k}">${k}:${v}</span>`).join('');
    const catsHtml=topCats.map(c=>`<div class="ov-cat-row"><div class="ov-cat-dot" style="background:${catColor(c.name)}"></div><div class="ov-cat-name" title="${c.name}">${c.name}</div><div class="ov-cat-bar-wrap"><div class="ov-cat-bar" style="width:${Math.round(c.count/maxCnt*100)}%;background:${catColor(c.name)}"></div></div><div class="ov-cat-cnt">${c.count}</div></div>`).join('');
    const extra=d.categories.length>4?`<div class="ov-more">+${d.categories.length-4} more</div>`:'';
    html+=`<div class="ov-card" onclick="document.querySelectorAll('.date-btn')[${idx}].click()"><div class="ov-card-head"><div class="ov-date-label">${d.display}</div><div class="ov-total-pill">${d.total}</div></div><div class="ov-prio-row">${prioHtml}</div><div class="ov-cats-list">${catsHtml}${extra}</div></div>`;
  });
  html+='</div>';document.getElementById('main').innerHTML=html;document.getElementById('main').scrollTop=0;
}
let matrixSortBy='total';
function hmClass(v){if(v===0)return 'hm-0';if(v<=1)return 'hm-1';if(v<=2)return 'hm-2';if(v<=3)return 'hm-3';if(v<=4)return 'hm-4';if(v<=5)return 'hm-5';if(v<=6)return 'hm-6';if(v<=7)return 'hm-7';return 'hm-high';}
function showMatrix(btn){setActive(btn);renderMatrix();}
function renderMatrix(){
  const cats=matrixSortBy==='total'?[...MATRIX.categories]:[...MATRIX.categories].sort();
  const dates=MATRIX.dates;const labels=MATRIX.date_labels;const totals=MATRIX.date_totals;
  let hdr=`<th class="cat-col">Category</th>`;
  labels.forEach((lbl,i)=>{const p=lbl.split(' ');hdr+=`<th title="${dates[i]}">${p[0]}<br><span style="font-size:10px;font-weight:400">${p[1]}</span></th>`;});
  hdr+=`<th style="border-left:2px solid var(--border)">Total</th>`;
  let rows='';
  cats.forEach(cat=>{
    const vals=MATRIX.matrix[cat]||dates.map(()=>0);const total=vals.reduce((a,b)=>a+b,0);
    let cells=`<td class="cat-name-cell"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${catColor(cat)};margin-right:6px;vertical-align:middle"></span>${cat}</td>`;
    vals.forEach(v=>{cells+=`<td><div class="hm-cell ${hmClass(v)}" title="${cat} · ${v} call${v!==1?'s':''}">${v===0?'·':v}</div></td>`;});
    cells+=`<td style="border-left:2px solid var(--border)"><span class="cat-total-cell">${total}</span></td>`;
    rows+=`<tr>${cells}</tr>`;
  });
  let totCells=`<td class="cat-name-cell" style="font-weight:700;color:var(--text)">Daily Total</td>`;
  let grand=0;totals.forEach(t=>{grand+=t;totCells+=`<td><span style="font-family:'JetBrains Mono',monospace;font-weight:600;font-size:12px;color:var(--text)">${t}</span></td>`;});
  totCells+=`<td style="border-left:2px solid var(--border);font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:13px">${grand}</td>`;
  document.getElementById('main').innerHTML=`
  <div class="page-header"><div class="page-title">Category × Daily Count</div><div class="page-subtitle">Category-wise call count for each day — April 2026</div></div>
  <div class="heatmap-wrap">
    <div class="heatmap-controls">
      <h3>Category-wise Daily Breakdown</h3>
      <div class="heatmap-legend"><span>Low</span><div class="hl-box hm-1"></div><div class="hl-box hm-3"></div><div class="hl-box hm-5"></div><div class="hl-box hm-high"></div><span>High</span></div>
      <button class="sort-btn ${matrixSortBy==='total'?'active':''}" onclick="matrixSortBy='total';renderMatrix()">Sort by Total</button>
      <button class="sort-btn ${matrixSortBy==='name'?'active':''}" onclick="matrixSortBy='name';renderMatrix()">Sort A–Z</button>
    </div>
    <div style="overflow-x:auto"><table class="heatmap"><thead><tr>${hdr}</tr></thead><tbody>${rows}<tr class="total-row">${totCells}</tr></tbody></table></div>
  </div>`;
  document.getElementById('main').scrollTop=0;
}
function showDate(date,btn){
  setActive(btn);const d=DATA[date];
  let hh=0,hl=0,lh=0,ll=0;
  d.categories.forEach(c=>c.records.forEach(r=>{const p=(r.p||'NA').replace('#N/A','NA').trim();if(p==='HH')hh++;else if(p==='HL')hl++;else if(p==='LH')lh++;else if(p==='LL')ll++;}));
  let html=`<div class="page-header"><div class="page-title">${d.display}, 2026</div><div class="page-subtitle">Mostly Asked Questions — Partner Call Report</div><span class="page-badge">New Project</span></div>
  <div class="stats-row">
    <div class="stat-card sc-total"><div class="sv">${d.total}</div><div class="sl">Total Calls</div></div>
    <div class="stat-card sc-cats"><div class="sv">${d.categories.length}</div><div class="sl">Categories</div></div>
    <div class="stat-card sc-HH"><div class="sv">${hh}</div><div class="sl">HH Priority</div></div>
    <div class="stat-card sc-HL"><div class="sv">${hl}</div><div class="sl">HL Priority</div></div>
    <div class="stat-card sc-LH"><div class="sv">${lh}</div><div class="sl">LH Priority</div></div>
    <div class="stat-card sc-LL"><div class="sv">${ll}</div><div class="sl">LL Priority</div></div>
  </div><div class="cats-grid">`;
  const maxCnt=d.categories[0]?.count||1;
  d.categories.forEach((cat,ci)=>{
    const color=catColor(cat.name);const barW=Math.round(cat.count/maxCnt*100);const SHOW=3;
    const items=cat.records.map((r,i)=>`<div class="vitem${i>=SHOW?' vhidden':''}"><div class="vbullet"></div><div class="vcontent"><div class="vtext">${r.v}</div><div class="vmeta">${prioBadge(r.p)}<span class="partner-chip">${r.partner||''}</span></div></div></div>`).join('');
    const extra=cat.records.length>SHOW?`<button class="show-more-btn" onclick="toggleMore(this)">+ ${cat.records.length-SHOW} more records</button>`:'';
    html+=`<div class="cat-card"><div class="cat-card-head"><div class="cat-name-row"><div class="cat-rank">#${ci+1}</div><div class="cat-name">${cat.name}</div></div><div class="cat-stats"><div class="cat-count-label">Count: <b>${cat.count}</b></div><div class="cat-pct-pill">${cat.pct}%</div><div class="cat-bar-wrap"><div class="cat-bar" style="width:${barW}%;background:${color}"></div></div></div></div><div class="vlist">${items}</div>${extra}</div>`;
  });
  html+='</div>';document.getElementById('main').innerHTML=html;document.getElementById('main').scrollTop=0;
  document.querySelectorAll('.vhidden').forEach(el=>el.style.display='none');
}
function toggleMore(btn){
  const card=btn.closest('.cat-card');const hidden=card.querySelectorAll('.vhidden');
  const isHidden=hidden[0].style.display==='none';
  hidden.forEach(el=>el.style.display=isHidden?'flex':'none');
  const n=btn.textContent.match(/\d+/)[0];
  btn.textContent=isHidden?'− hide extra records':`+ ${n} more records`;
}
buildNav();
showMatrix(document.getElementById('btn-matrix'));
</script>
</body>
</html>
